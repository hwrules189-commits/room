<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { background: #ffffff; overflow: hidden; }
  #info { position: absolute; top: 10px; left: 10px; color: #333; font-family: sans-serif; font-size: 14px; }
</style>
</head>
<body>
<div id="info">Loading...</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/controls/OrbitControls.js"></script>

<script>
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 5);

scene.add(new THREE.AmbientLight(0xffffff, 2));
const d = new THREE.DirectionalLight(0xffffff, 2);
d.position.set(5, 10, 5);
scene.add(d);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

new THREE.GLTFLoader().load(
  'https://hwrules189-commits.github.io/room/room%20test%20on%20site.glb',
  function(gltf) {
    scene.add(gltf.scene);
    var box = new THREE.Box3().setFromObject(gltf.scene);
    var center = box.getCenter(new THREE.Vector3());
    var size = box.getSize(new THREE.Vector3());
    var maxDim = Math.max(size.x, size.y, size.z);
    gltf.scene.position.sub(center);
    camera.position.set(0, size.y * 0.3, maxDim * 1.2);
    controls.target.set(0, 0, 0);
    controls.update();
    document.getElementById('info').textContent = 'Drag to look · Scroll to zoom';
  },
  function(xhr) {
    document.getElementById('info').textContent = 'Loading... ' + Math.round(xhr.loaded / xhr.total * 100) + '%';
  },
  function(err) {
    document.getElementById('info').textContent = 'Error: ' + err.message;
    console.error(err);
  }
);

(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
