<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
#c { display: block; width: 100%; height: 100%; }
#ui { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.6); font: 13px/1 sans-serif; pointer-events: none; white-space: nowrap; }
#loader { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; color: #fff; font: 14px sans-serif; gap: 16px; }
#bar-wrap { width: 200px; height: 2px; background: rgba(255,255,255,0.15); border-radius: 2px; }
#bar { height: 100%; width: 0%; background: #fff; border-radius: 2px; transition: width 0.3s; }
</style>
</head>
<body>
<div id="loader">
  <span id="ltxt">Loading...</span>
  <div id="bar-wrap"><div id="bar"></div></div>
</div>
<canvas id="c"></canvas>
<div id="ui"></div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js';

const canvas   = document.getElementById('c');
const loader   = document.getElementById('loader');
const ltxt     = document.getElementById('ltxt');
const bar      = document.getElementById('bar');
const ui       = document.getElementById('ui');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

const camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.001, 5000);
camera.position.set(0, 0, 0);

scene.add(new THREE.AmbientLight(0xffffff, 4));
const sun = new THREE.DirectionalLight(0xffffff, 2);
sun.position.set(5, 10, 5);
scene.add(sun);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.rotateSpeed = 0.5;
controls.zoomSpeed = 0.8;
controls.enablePan = false;

new GLTFLoader().load(
  'room.glb',
  function(gltf) {
    const model = gltf.scene;

    // no scaling first — let's see the natural size
    scene.add(model);

    const box    = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size   = box.getSize(new THREE.Vector3());

    // log size so we know what we're dealing with
    console.log('Model size:', size);
    console.log('Model center:', center);

    // scale so the room is at least 20 units across
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale  = 20 / maxDim;
    model.scale.setScalar(scale);

    // recalculate after scaling
    const box2    = new THREE.Box3().setFromObject(model);
    const center2 = box2.getCenter(new THREE.Vector3());
    const size2   = box2.getSize(new THREE.Vector3());

    // put camera dead center inside the room
    camera.position.set(center2.x, center2.y, center2.z);

    // look toward the far wall
    controls.target.set(center2.x, center2.y, center2.z + size2.z * 0.4);
    controls.update();

    loader.style.opacity = '0';
    loader.style.transition = 'opacity 0.8s';
    setTimeout(() => loader.style.display = 'none', 850);
    ui.textContent = 'Drag to look around  ·  Scroll to zoom';
  },
  function(xhr) {
    if (xhr.total > 0) {
      const pct = Math.round(xhr.loaded / xhr.total * 100);
      ltxt.textContent = 'Loading ' + pct + '%';
      bar.style.width = pct + '%';
    } else {
      ltxt.textContent = 'Loading ' + Math.round(xhr.loaded / 1024) + ' KB';
      bar.style.width = Math.min(85, xhr.loaded / 50000) + '%';
    }
  },
  function(err) {
    ltxt.textContent = 'Error: ' + (err.message || err);
    bar.style.background = '#f44';
    console.error(err);
  }
);

(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
