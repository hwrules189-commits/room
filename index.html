<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; }
#info { position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; font-size: 14px; }
</style>
</head>
<body>
<div id="info">Loading...</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.150/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150/examples/js/controls/OrbitControls.js"></script>
<script>
var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);
var camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.001, 5000);
scene.add(new THREE.AmbientLight(0xffffff, 4));
var dl = new THREE.DirectionalLight(0xffffff, 2);
dl.position.set(5, 10, 5);
scene.add(dl);
var controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
document.getElementById('info').textContent = 'Fetching GLB...';
new THREE.GLTFLoader().load(
  'https://hwrules189-commits.github.io/room/room2.glb',
  function(gltf) {
    scene.add(gltf.scene);
    var box = new THREE.Box3().setFromObject(gltf.scene);
    var center = box.getCenter(new THREE.Vector3());
    var size = box.getSize(new THREE.Vector3());
    var scale = 20 / Math.max(size.x, size.y, size.z);
    gltf.scene.scale.setScalar(scale);
    var box2 = new THREE.Box3().setFromObject(gltf.scene);
    var c2 = box2.getCenter(new THREE.Vector3());
    var s2 = box2.getSize(new THREE.Vector3());
    camera.position.set(c2.x, c2.y, c2.z);
    controls.target.set(c2.x, c2.y, c2.z + s2.z * 0.4);
    controls.update();
    document.getElementById('info').textContent = 'Drag to look around';
  },
  function(xhr) {
    document.getElementById('info').textContent = 'Loading ' + xhr.loaded + ' bytes';
  },
  function(err) {
    document.getElementById('info').textContent = 'ERROR: ' + err.message;
  }
);
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();
window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
