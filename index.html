<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { background: #ffffff; overflow: hidden; }
  #info { position: absolute; top: 10px; left: 10px; color: #333; font-family: sans-serif; font-size: 14px; max-width: 90vw; word-break: break-word; }
</style>
</head>
<body>
<div id="info">Loading...</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/controls/OrbitControls.js"></script>
<script>
function log(msg) {
  document.getElementById('info').textContent = msg;
  console.log(msg);
}

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.001, 5000);
camera.position.set(0, 0, 0);

scene.add(new THREE.AmbientLight(0xffffff, 3));
const d = new THREE.DirectionalLight(0xffffff, 2);
d.position.set(5, 10, 5);
scene.add(d);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.rotateSpeed = 0.6;
controls.zoomSpeed = 0.8;

log('Three.js ready, fetching GLB...');

const loader = new THREE.GLTFLoader();
loader.load(
  'https://hwrules189-commits.github.io/room/room%20test%20on%20site.glb',
  function(gltf) {
    log('GLB loaded! Adding to scene...');
    gltf.scene.scale.set(8, 8, 8);
    scene.add(gltf.scene);

    var box = new THREE.Box3().setFromObject(gltf.scene);
    var center = box.getCenter(new THREE.Vector3());
    var size = box.getSize(new THREE.Vector3());

    log('Box size: ' + size.x.toFixed(2) + ' x ' + size.y.toFixed(2) + ' x ' + size.z.toFixed(2));

    camera.position.set(center.x, center.y - size.y * 0.05, center.z);
    controls.target.set(center.x, center.y - size.y * 0.05, center.z + size.z * 0.3);
    controls.update();

    setTimeout(() => log('Drag to look around · Scroll to zoom'), 2000);
  },
  function(xhr) {
    log('Downloading... ' + xhr.loaded + ' bytes');
  },
  function(err) {
    log('ERROR: ' + (err.message || JSON.stringify(err)));
    console.error(err);
  }
);

(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
