<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
#overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.4); display: none; pointer-events: none; z-index: 10; }
</style>
</head>
<body>
<div id="overlay"></div>

<script>
function loadScript(src, cb) {
  var s = document.createElement('script');
  s.src = src;
  s.onload = cb;
  document.head.appendChild(s);
}
loadScript('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js', function() {
loadScript('https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js', function() {
loadScript('https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/DRACOLoader.js', function() {
loadScript('https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js', function() {

  var dracoLoader = new THREE.DRACOLoader();
  dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128/examples/js/libs/draco/');
  var gltfLoader = new THREE.GLTFLoader();
  gltfLoader.setDRACOLoader(dracoLoader);

  var renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.outputEncoding = THREE.sRGBEncoding;
  document.body.appendChild(renderer.domElement);

  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);
  var camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.001, 5000);
  scene.add(new THREE.AmbientLight(0xffffff, 2));
  var dl = new THREE.DirectionalLight(0xffffff, 1.5);
  dl.position.set(5, 10, 5);
  scene.add(dl);

  var controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.rotateSpeed = 0.5;
  controls.enableZoom = false;
  controls.enablePan = false;

  renderer.domElement.addEventListener('dblclick', function(e) { e.stopPropagation(); e.preventDefault(); }, true);
  renderer.domElement.addEventListener('contextmenu', function(e) { e.preventDefault(); });

  var mixer = null;
  var clock = new THREE.Clock();
  var currentRoom = 'room9';
  var SPEED = 0.05;
  var overlay = document.getElementById('overlay');

  // --- BONE POSING STATE ---
  var poseMode = false;
  var boneHelpers = [];
  var selectedBone = null;
  var isDraggingBone = false;
  var lastMouse = new THREE.Vector2();

  function loadRoom(glbUrl) {
    poseMode = false;
    boneHelpers = [];
    selectedBone = null;
    var toRemove = [];
    scene.traverse(function(obj) { if (!obj.isScene) toRemove.push(obj); });
    toRemove.forEach(function(obj) { scene.remove(obj); });
    scene.add(new THREE.AmbientLight(0xffffff, 2));
    var dl2 = new THREE.DirectionalLight(0xffffff, 1.5);
    dl2.position.set(5, 10, 5);
    scene.add(dl2);
    if (mixer) { mixer.stopAllAction(); mixer = null; }

    gltfLoader.load(glbUrl, function(gltf) {
      var model = gltf.scene;
      model.scale.setScalar(10);

      gltf.scene.traverse(function(obj) {
        if (obj.name === 'Empty') {
          obj.scale.set(0.011, 0.011, 0.011);
        }
      });

      scene.add(model);

      if (gltf.animations.length > 0) {
        mixer = new THREE.AnimationMixer(gltf.scene);
        gltf.animations.forEach(function(clip) {
          var action = mixer.clipAction(clip);
          action.reset();
          action.setEffectiveTimeScale(1);
          action.setEffectiveWeight(1);
          action.setLoop(THREE.LoopRepeat, Infinity);
          action.play();
        });
      }

      var box = new THREE.Box3().setFromObject(model);
      var center = box.getCenter(new THREE.Vector3());
      var size = box.getSize(new THREE.Vector3());
      camera.position.set(center.x, center.y, center.z);
      controls.target.set(center.x + 0.01, center.y, center.z - 0.01);
      controls.update();
      SPEED = size.x * 0.01;
    }, null, function(err) { console.error(err); });
  }

  function loadPuppet() {
    overlay.style.display = 'block';
    boneHelpers = [];
    selectedBone = null;

    var toRemove = [];
    scene.traverse(function(obj) { if (!obj.isScene) toRemove.push(obj); });
    toRemove.forEach(function(obj) { scene.remove(obj); });
    if (mixer) { mixer.stopAllAction(); mixer = null; }

    scene.add(new THREE.AmbientLight(0xffffff, 3));
    var dl2 = new THREE.DirectionalLight(0xffffff, 2);
    dl2.position.set(5, 10, 5);
    scene.add(dl2);
    var dl3 = new THREE.DirectionalLight(0xffffff, 1);
    dl3.position.set(-5, 5, -5);
    scene.add(dl3);

    gltfLoader.load('https://cdn.jsdelivr.net/gh/hwrules189-commits/room@main/wrestlerpuppet.glb', function(gltf) {
      var model = gltf.scene;
      model.scale.setScalar(10);
      scene.add(model);

      // Collect bones and add clickable sphere helpers
      model.traverse(function(obj) {
        if (obj.isBone) {
          var geo = new THREE.SphereGeometry(0.04, 8, 8);
          var mat = new THREE.MeshBasicMaterial({ color: 0x00ccff, depthTest: false, transparent: true, opacity: 0.8 });
          var sphere = new THREE.Mesh(geo, mat);
          sphere.userData.bone = obj;
          sphere.renderOrder = 999;
          scene.add(sphere); // add to scene so we can update position each frame
          boneHelpers.push(sphere);
        }
      });

      var box = new THREE.Box3().setFromObject(model);
      var center = box.getCenter(new THREE.Vector3());
      var size = box.getSize(new THREE.Vector3());
      var maxDim = Math.max(size.x, size.y, size.z);

      camera.position.set(center.x, center.y, center.z + maxDim * 1.8);
      controls.target.copy(center);
      controls.enableZoom = true;
      controls.update();

      poseMode = true;
      console.log('Bones found:', boneHelpers.length);
    }, null, function(err) { console.error(err); });
  }

  loadRoom('https://cdn.jsdelivr.net/gh/hwrules189-commits/room@main/room9.glb');

  // --- CLICK ---
  renderer.domElement.addEventListener('mousedown', function(e) {
    var raycaster = new THREE.Raycaster();
    var mouse = new THREE.Vector2();
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    if (poseMode) {
      // Try to select a bone sphere
      var intersects = raycaster.intersectObjects(boneHelpers, false);
      if (intersects.length > 0) {
        selectedBone = intersects[0].object.userData.bone;
        boneHelpers.forEach(function(h) { h.material.color.set(0x00ccff); });
        intersects[0].object.material.color.set(0xff6600);
        isDraggingBone = true;
        controls.enabled = false;
        lastMouse.set(e.clientX, e.clientY);
      }
      return;
    }

    // Room click
    if (currentRoom !== 'room9') return;
    var all = [];
    scene.traverse(function(obj) { if (obj.isMesh) all.push(obj); });
    var intersects2 = raycaster.intersectObjects(all, true);
    if (intersects2.length > 0) {
      var obj = intersects2[0].object;
      var isWrestler = false;
      while (obj) {
        if (obj.name === 'Mesh_0' || obj.name === 'Mesh_0.005') { isWrestler = true; break; }
        obj = obj.parent;
      }
      if (isWrestler) {
        currentRoom = 'puppet';
        loadPuppet();
      }
      // Add more clickable object checks here
    }
  });

  // --- DRAG BONE ---
  renderer.domElement.addEventListener('mousemove', function(e) {
    if (!isDraggingBone || !selectedBone) return;
    var dx = (e.clientX - lastMouse.x) * 0.008;
    var dy = (e.clientY - lastMouse.y) * 0.008;
    selectedBone.rotation.z -= dx;
    selectedBone.rotation.x += dy;
    lastMouse.set(e.clientX, e.clientY);
  });

  renderer.domElement.addEventListener('mouseup', function() {
    if (isDraggingBone) {
      isDraggingBone = false;
      controls.enabled = true;
    }
  });

  var forward = new THREE.Vector3();
  var right = new THREE.Vector3();
  var keys = {};
  document.addEventListener('keydown', function(e) { keys[e.code] = true; });
  document.addEventListener('keyup', function(e) { keys[e.code] = false; });

  function animate() {
    requestAnimationFrame(animate);
    var delta = clock.getDelta();
    if (mixer) mixer.update(delta);

    // Keep bone helper spheres on top of their bones
    if (poseMode && boneHelpers.length > 0) {
      boneHelpers.forEach(function(sphere) {
        var wp = new THREE.Vector3();
        sphere.userData.bone.getWorldPosition(wp);
        sphere.position.copy(wp);
      });
    }

    if (!poseMode) {
      if (keys['ArrowUp']||keys['KeyW']) { camera.getWorldDirection(forward); forward.y=0; forward.normalize().multiplyScalar(SPEED); camera.position.add(forward); controls.target.add(forward); }
      if (keys['ArrowDown']||keys['KeyS']) { camera.getWorldDirection(forward); forward.y=0; forward.normalize().multiplyScalar(-SPEED); camera.position.add(forward); controls.target.add(forward); }
      if (keys['ArrowLeft']||keys['KeyA']) { camera.getWorldDirection(forward); right.crossVectors(forward,camera.up).normalize().multiplyScalar(-SPEED); camera.position.add(right); controls.target.add(right); }
      if (keys['ArrowRight']||keys['KeyD']) { camera.getWorldDirection(forward); right.crossVectors(forward,camera.up).normalize().multiplyScalar(SPEED); camera.position.add(right); controls.target.add(right); }
    }

    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

})})})});
</script>
</body>
</html>
